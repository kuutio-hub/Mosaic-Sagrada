<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagrada Window Pattern Designer</title>
    <!-- Google Fonts: Uncial Antiqua -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/sagrada/192/192">
    
    <!-- Külső könyvtárak CDN-ről (PDF generáláshoz) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="no-print">
        <div class="header-content">
            <h1 data-i18n="title">Sagrada Pattern Designer</h1>
            <div class="controls">
                <div class="control-item">
                    <button class="lang-btn" data-lang="hu" title="Magyar">🇭🇺</button>
                    <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
                    <button class="lang-btn" data-lang="de" title="Deutsch">🇩🇪</button>
                </div>
                <div class="control-item">
                    <label for="double-sided" id="label-double-sided" data-i18n="doubleSided">Kétoldalas:</label>
                    <input type="checkbox" id="double-sided" checked>
                </div>
                <button id="add-to-queue" class="btn-secondary" data-i18n="addToQueue">Hozzáadás a listához</button>
                
                <div class="print-dropdown" style="position: relative; display: inline-block;">
                    <button id="print-menu-btn" class="btn-primary" data-i18n="print">Nyomtatás ▼</button>
                    <div id="print-menu-content" style="display: none; position: absolute; right: 0; background-color: var(--panel-bg); backdrop-filter: blur(20px); min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; border-radius: 12px; padding: 10px; border: 1px solid var(--panel-border); margin-top: 5px;">
                        <button id="export-pdf" class="btn-secondary" style="width: 100%; margin-bottom: 5px; text-align: left;" data-i18n="exportPDF">PDF Export (Lista)</button>
                        <button id="print-btn" class="btn-secondary" style="width: 100%; margin-bottom: 5px; text-align: left;" data-i18n="print">Nyomtatás (Lista)</button>
                        <label style="display: block; margin-top: 10px; font-size: 12px; color: var(--text-primary); cursor: pointer;">
                            <input type="checkbox" id="printer-friendly"> <span data-i18n="printerFriendly">Nyomtatóbarát</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="editor-area">
        <div class="main-layout">
            <aside class="tools-sidebar no-print">
                <div class="tool-section">
                    <h3 id="title-promo" data-i18n="promoCards">Promo kártyák</h3>
                    <select id="promo-select">
                        <option value="">Válassz promo kártyát...</option>
                    </select>
                    <button id="apply-promo" class="btn-secondary" style="width: 100%; margin-top: 10px;" data-i18n="apply">Alkalmaz</button>
                </div>
                <div class="tool-section">
                    <h3 id="title-saved" data-i18n="savedCards">Saját kártyák</h3>
                    <select id="saved-select">
                        <option value="">Válassz mentett kártyát...</option>
                    </select>
                    <button id="apply-saved" class="btn-secondary" style="width: 100%; margin-top: 10px;" data-i18n="apply">Alkalmaz</button>
                    <button id="save-card" class="btn-secondary" style="width: 100%; margin-top: 10px;" data-i18n="saveCard">Mentés a tárba</button>
                </div>
            </aside>

            <div class="editor-container">
                <div class="card-wrapper active" id="card-container">
                    <div id="side-toggle" class="side-tag">ELŐLAP (Kattints a fordításhoz)</div>
                    <div id="card-front" class="sagrada-card">
                        <div class="svg-layer" id="frame-front-svg"></div>
                        <div class="grid-layer" id="grid-front"></div>
                        <div class="footer-layer">
                            <input type="text" class="card-title-input" value="MINTA NÉV" data-side="front">
                        </div>
                        <div class="difficulty-display" data-side="front"></div>
                    </div>
                    <div id="card-back" class="sagrada-card" style="display:none;">
                        <div class="svg-layer" id="frame-back-svg"></div>
                        <div class="grid-layer" id="grid-back"></div>
                        <div class="footer-layer">
                            <input type="text" class="card-title-input" value="MINTA NÉV (HÁT)" data-side="back">
                        </div>
                        <div class="difficulty-display" data-side="back"></div>
                    </div>
                </div>
            </div>

            <aside class="queue-sidebar no-print">
                <h3 id="title-queue" data-i18n="queue">Nyomtatási lista</h3>
                <div id="pattern-queue" class="queue-list">
                    <p class="empty-msg" data-i18n="emptyQueue">A lista üres. Adj hozzá mintákat!</p>
                </div>
                <div class="queue-actions">
                    <button id="clear-queue" class="btn-danger" data-i18n="clearQueue">Lista törlése</button>
                </div>
            </aside>
        </div>
    </main>

    <!-- Cellaválasztó menü -->
    <div id="cell-picker" class="picker-hidden">
        <div class="picker-section">
            <p id="label-colors" data-i18n="colors">Színek</p>
            <div class="picker-grid colors">
                <div class="picker-item color-r" data-val="R" data-type="color"></div>
                <div class="picker-item color-g" data-val="G" data-type="color"></div>
                <div class="picker-item color-b" data-val="B" data-type="color"></div>
                <div class="picker-item color-y" data-val="Y" data-type="color"></div>
                <div class="picker-item color-p" data-val="P" data-type="color"></div>
                <div class="picker-item color-w" data-val="W" data-type="color"></div>
            </div>
        </div>
        <div class="picker-section">
            <p id="label-numbers" data-i18n="numbers">Számok</p>
            <div class="picker-grid numbers">
                <div class="picker-item" data-val="1" data-type="value">1</div>
                <div class="picker-item" data-val="2" data-type="value">2</div>
                <div class="picker-item" data-val="3" data-type="value">3</div>
                <div class="picker-item" data-val="4" data-type="value">4</div>
                <div class="picker-item" data-val="5" data-type="value">5</div>
                <div class="picker-item" data-val="6" data-type="value">6</div>
            </div>
        </div>
        <div class="picker-section">
            <div class="picker-grid special">
                <div class="picker-item" data-val="X" data-type="value">X</div>
                <div class="picker-item" data-val="." data-type="clear" data-i18n="empty">Üres</div>
            </div>
        </div>
    </div>

    <!-- Nyomtatási konténer -->
    <div id="print-container"></div>

    <script type="module" src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
